# golangci-lint v1.64.8 configuration
# Keep release gates strict on correctness and security, but avoid style-only
# noise that is not realistic for this repository.

run:
  timeout: 5m
  tests: true
  concurrency: 4

output:
  formats:
    - format: colored-line-number
  sort-results: true

linters:
  disable-all: true
  enable:
    - errcheck
    - errname
    - errorlint
    - gofmt
    - goimports
    - gosimple
    - gosec
    - govet
    - ineffassign
    - nilerr
    - nilnil
    - nolintlint
    - nosprintfhostport
    - rowserrcheck
    - staticcheck
    - unconvert
    - unused
    - wastedassign

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false

  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow

  gosec:
    excludes:
      - G104
      - G304

  nolintlint:
    require-explanation: true
    require-specific: true

  rowserrcheck:
    packages:
      - github.com/jmoiron/sqlx

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    - path: aes/cfb\.go
      linters:
        - staticcheck
      text: "SA1019:"
    - path: rsa/pkcs1\.go
      linters:
        - staticcheck
      text: "SA1019:"
