name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  lint-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve production packages
        id: packages
        shell: bash
        run: |
          echo "prod=$(go list ./... | grep -v '^github.com/gtkit/encry/examples/' | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Lint production packages
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          args: ${{ steps.packages.outputs.prod }}

  lint-examples:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve example packages
        id: packages
        shell: bash
        run: |
          echo "examples=$(go list ./... | grep '^github.com/gtkit/encry/examples/' | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Lint example packages
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          args: ${{ steps.packages.outputs.examples }}

  security-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0

      - name: Security scan production packages
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make check-secure-prod

  verify-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify production packages
        run: make verify-prod

  verify-examples:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test examples
        run: make test-examples

      - name: Build examples
        run: make build-examples
